{
  "$schema": "node_modules/wrangler/config-schema.json",
  "assets": {
    "binding": "ASSETS",
    "directory": "./dist/client",
    "html_handling": "drop-trailing-slash",
    "not_found_handling": "single-page-application",
    "run_worker_first": false
  },
  "compatibility_date": "2026-03-15",
  "compatibility_flags": ["nodejs_compat", "no_handle_cross_request_promise_resolution"],
  "d1_databases": [
    {
      "binding": "DB_LIBRARY",
      "database_id": "1e164957-3c19-4421-a959-911483b0f935",
      "database_name": "retroassembly_library",
      "migrations_dir": "src/databases/migrations"
    }
  ],
  "main": "./src/server/workerd.ts",
  "name": "retroassembly",
  "observability": {
    "enabled": true,
    "head_sampling_rate": 1
  },
  "placement": {
    "mode": "smart"
  },
  "preview_urls": true,
  "r2_buckets": [
    {
      "binding": "BUCKET",
      "bucket_name": "retroassembly",
      "preview_bucket_name": "retroassembly"
    }
  ],
  "services": [
    {
      "binding": "MSLEUTH",
      "service": "msleuth"
    }
  ],
  "upload_source_maps": true
}
